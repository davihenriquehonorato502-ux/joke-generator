<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Piadas</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .container {
      padding: 40px 20px;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 40px;
      margin: 0 0 20px 0;
      background: linear-gradient(135deg, #5865F2, #2b2d31);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .joke-card {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      margin: 30px 0;
      min-height: 150px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border: 2px solid #5865F2;
      box-shadow: 0 0 20px rgba(88, 101, 242, 0.3);
    }

    .joke-text {
      font-size: 20px;
      line-height: 1.6;
      color: #cbd5e1;
      margin: 0;
    }

    .joke-punchline {
      font-size: 18px;
      color: #5865F2;
      margin-top: 15px;
      font-weight: bold;
    }

    .button-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 25px;
      background: #5865F2;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      background: #4752c4;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(88, 101, 242, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #64748b;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    .loading {
      display: none;
      font-size: 18px;
      color: #5865F2;
    }

    .counter {
      font-size: 14px;
      color: #94a3b8;
      margin-top: 20px;
    }

    .error {
      color: #ef4444;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>😂 Gerador de Piadas</h1>
    
    <div class="joke-card">
      <p class="joke-text" id="jokeText">Clique abaixo para carregar uma piada!</p>
      <p class="joke-punchline" id="punchline"></p>
    </div>

    <div class="loading" id="loading">Carregando piada...</div>

    <div class="button-group">
      <button class="btn" onclick="getJoke()">🎲 Obter Piada</button>
      <button class="btn btn-secondary" onclick="shareJoke()">📤 Compartilhar</button>
    </div>

    <div class="counter">
      Piadas carregadas: <span id="count">0</span>
    </div>
  </div>

  <script>
    let jokeCount = 0;
    let currentJoke = '';
    let currentPunchline = '';

    async function getJoke() {
      const loadingElement = document.getElementById('loading');
      const jokeElement = document.getElementById('jokeText');
      const punchlineElement = document.getElementById('punchline');
      
      loadingElement.style.display = 'block';
      jokeElement.textContent = '';
      punchlineElement.textContent = '';

      try {
        const response = await fetch('https://v2.jokeapi.dev/joke/Any?lang=pt');
        const data = await response.json();

        loadingElement.style.display = 'none';

        if (data.type === 'single') {
          currentJoke = data.joke;
          currentPunchline = '';
          jokeElement.textContent = data.joke;
          punchlineElement.textContent = '';
        } else {
          currentJoke = data.setup;
          currentPunchline = data.delivery;
          jokeElement.textContent = data.setup;
          punchlineElement.textContent = data.delivery;
        }

        jokeCount++;
        document.getElementById('count').textContent = jokeCount;

      } catch (error) {
        loadingElement.style.display = 'none';
        jokeElement.textContent = 'Erro ao carregar piada. Tente novamente!';
        jokeElement.classList.add('error');
      }
    }

    function shareJoke() {
      if (!currentJoke) {
        alert('Carregue uma piada primeiro!');
        return;
      }

      const text = currentPunchline 
        ? `${currentJoke}\n${currentPunchline}` 
        : currentJoke;
      
      const message = `Olha essa piada legal: ${text}`;
      
      if (navigator.share) {
        navigator.share({
          title: 'Piada Legal',
          text: message
        });
      } else {
        alert(message);
      }
    }

    // Carregar uma piada ao abrir
    getJoke();
  </script>

</body>
</html>
